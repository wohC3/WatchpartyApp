<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Room</title>
  <link href="css/style.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.0/signalr.min.js"></script>
  <script src="js/signalr.js" defer></script>
  <script src="js/chat.js" defer></script>
</head>

<body>
  <nav>
    <div class="nav-container">
      <div class="nav-logo">
        <img src="/images/logo.jpg" alt="app-logo">
      </div>
      <div class="nav-links">
        <ul>
          <li>
            <a href="/">Homepage</a>
          </li>
          <li>
            <a href="/login.html">Login</a>
          </li>
        </ul>

      </div>
    </div>
  </nav>

  <main>
    <div class="main-room-container">
      <div class="main-room-users">Users
        <ul id="usersList"></ul>
      </div>
      <div class="main-room-video">
        <div class="video-wrapper">
          <div id="player"></div>
        </div>
      </div>

      <script src="js/playerSync.js" defer></script>
      <script src="https://www.youtube.com/iframe_api"></script>

      <div class="main-room-chat">chat
        <div id="chatMessages"></div>
        <input id="chatInput" placeholder="Hello...">
        <button id="sendButton">Send</button>
      </div>
      <div class="videoChange">
        <input id="videoUrl" placeholder="Paste YouTube link">
        <button id="loadVideo">Load Video</button>
      </div>
    </div>





  </main>
</body>

</html>
